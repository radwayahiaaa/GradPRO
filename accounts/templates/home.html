<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            font-size: 3.5rem; 
            color: #2c3e50;
            margin-bottom: 10px;
        }

        p {
            color: #7f8c8d;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .button-container {
            display: flex;
            gap: 20px; 
        }

        .btn {
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease; 
        }

        .btn-login {
            background-color: #3498db;
            color: white;
            border: 2px solid #3498db;
        }

        .btn-signup {
            background-color: transparent;
            color: #3498db;
            border: 2px solid #3498db;
        }

        .btn-login:hover {
            background-color: #2980b9;
            transform: translateY(-3px); 
        }

        .btn-signup:hover {
            background-color: #3498db;
            color: white;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    {% if user.is_authenticated %}
        <h1>Welcome, {{ user.username }}!</h1>
        <p>We are glad to see you back. You are successfully logged in.</p>
        
        <div class="button-container">
            <a href="{% url 'logout' %}" class="btn btn-login">Logout</a> 
        </div>

    {% else %}
        <h1>Welcome!</h1>
        <p>We are glad to see you here. Please log in to continue.</p>

        <div class="button-container">
            <a href="{% url 'login' %}" class="btn btn-login">Login</a>
            <a href="{% url 'signup' %}" class="btn btn-signup">Sign Up</a>
        </div>
    {% endif %}

</body>
</html>
